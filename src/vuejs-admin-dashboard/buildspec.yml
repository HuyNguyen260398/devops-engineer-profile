version: 0.2

# ============================================================================
# CodeBuild build specification for the Vue.js Admin Dashboard
# ============================================================================
# Phases:
#   install   — enable corepack, activate pnpm, install dependencies
#   build     — compile the Vite/Vue.js SPA to dist/
#   post_build — emit a build summary for the logs
#
# Artifacts:
#   The dist/ directory is uploaded as the pipeline build artifact and passed
#   to the Deploy stage where it is pushed to AWS Amplify.
# ============================================================================

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "--- Enabling corepack and activating pnpm ---"
      - corepack enable
      - corepack prepare pnpm@9.15.0 --activate
      - echo "--- Installing dependencies ---"
      - pnpm install --frozen-lockfile

  build:
    commands:
      - echo "--- Building Vue.js Admin Dashboard ---"
      - pnpm run build

  post_build:
    commands:
      - echo "--- Build complete ---"
      - ls -la dist/

cache:
  paths:
    - /root/.local/share/pnpm/store/**/*

artifacts:
  base-directory: dist
  files:
    - "**/*"
  discard-paths: no
