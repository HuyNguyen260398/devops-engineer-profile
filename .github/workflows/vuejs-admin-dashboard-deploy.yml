name: Vue.js Admin Dashboard — Deploy

# Quality gate (lint, type-check, build) runs on every push to main that
# touches app source. If the gate passes, the app subtree is mirrored to
# AWS CodeCommit, which triggers the existing EventBridge → CodePipeline →
# CodeBuild → Amplify deployment chain.
#
# Required GitHub secret:
#   VUEJS_ADMIN_DASHBOARD_CODECOMMIT_SYNC_ROLE_ARN  — IAM role ARN (OIDC assumable by this repo)
#
# CodeCommit target:
#   https://git-codecommit.ap-southeast-1.amazonaws.com/v1/repos/vuejs-admin-dashboard
#   branch: main

on:
  push:
    branches:
      - main
    paths:
      - "src/vuejs-admin-dashboard/**"
      - ".github/workflows/vuejs-admin-dashboard-deploy.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: vuejs-admin-dashboard-deploy
  cancel-in-progress: false  # Never cancel an in-progress deployment

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  WORKING_DIR: "src/vuejs-admin-dashboard"
  AWS_REGION: "ap-southeast-1"
  CODECOMMIT_REPO_NAME: "vuejs-admin-dashboard"
  CODECOMMIT_BRANCH: "main"
  CODECOMMIT_REMOTE_URL: "https://git-codecommit.ap-southeast-1.amazonaws.com/v1/repos/vuejs-admin-dashboard"
  SYNC_STAGING_DIR: "/tmp/codecommit-sync"

jobs:
  deploy:
    name: Quality Gate & Mirror to CodeCommit
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      # -------------------------------------------------------------------------
      # Quality gate (must pass before mirroring to CodeCommit)
      # -------------------------------------------------------------------------

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm lint

      - name: Type-check
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm type-check

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm build

      # -----------------------------------------------------------------------
      # OIDC auth to the CodeCommit sync role. No long-lived credentials.
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.VUEJS_ADMIN_DASHBOARD_CODECOMMIT_SYNC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Configure git identity and the AWS CodeCommit credential helper.
      # UseHttpPath MUST be true so the helper returns credentials scoped to
      # the repo path.
      # -----------------------------------------------------------------------
      - name: Configure git and CodeCommit credential helper
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true

      # -----------------------------------------------------------------------
      # Copy the app subtree into a clean staging dir, excluding anything
      # that must not land in CodeCommit (node_modules, dist, .git, local env).
      # -----------------------------------------------------------------------
      - name: Stage app subtree
        run: |
          rm -rf "${SYNC_STAGING_DIR}"
          mkdir -p "${SYNC_STAGING_DIR}"
          rsync -a \
            --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.env.*' \
            "${WORKING_DIR}/" "${SYNC_STAGING_DIR}/"

      # -----------------------------------------------------------------------
      # Initialise a fresh orphan repo with a single commit containing the
      # current tree. Each run replaces CodeCommit history with a fresh
      # snapshot — CodePipeline only cares about the current tree, not history.
      # -----------------------------------------------------------------------
      - name: Create orphan commit
        id: commit
        working-directory: ${{ env.SYNC_STAGING_DIR }}
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          git init -q -b "${CODECOMMIT_BRANCH}"
          git add -A

          if git diff --cached --quiet; then
            echo "Staging directory is empty — nothing to commit."
            exit 1
          fi

          COMMIT_MSG=$(cat <<EOF
          chore: sync from GitHub commit ${COMMIT_SHA:0:7}

          ${COMMIT_MESSAGE}

          Source-Repo: ${GITHUB_REPOSITORY}
          Source-SHA: ${COMMIT_SHA}
          Source-Author: @${COMMIT_AUTHOR}
          EOF
          )

          git commit -q -m "${COMMIT_MSG}"
          LOCAL_SHA=$(git rev-parse HEAD)
          LOCAL_TREE=$(git rev-parse HEAD^{tree})
          echo "local_sha=${LOCAL_SHA}"   >> "$GITHUB_OUTPUT"
          echo "local_tree=${LOCAL_TREE}" >> "$GITHUB_OUTPUT"
          echo "Local commit:  ${LOCAL_SHA}"
          echo "Local tree:    ${LOCAL_TREE}"

      # -----------------------------------------------------------------------
      # Idempotency guard: fetch the current remote tip and compare its tree
      # hash against ours. If they match, skip the push entirely.
      # Handles the first-run case (remote branch does not yet exist).
      # -----------------------------------------------------------------------
      - name: Detect no-op sync
        id: idempotency
        working-directory: ${{ env.SYNC_STAGING_DIR }}
        run: |
          git remote add codecommit "${CODECOMMIT_REMOTE_URL}"

          set +e
          git fetch --depth=1 codecommit "${CODECOMMIT_BRANCH}" 2>/tmp/fetch.err
          FETCH_STATUS=$?
          set -e

          if [ "${FETCH_STATUS}" -ne 0 ]; then
            if grep -q "couldn't find remote ref" /tmp/fetch.err \
               || grep -q "Couldn't find remote ref" /tmp/fetch.err; then
              echo "Remote branch ${CODECOMMIT_BRANCH} does not yet exist — first sync."
              echo "skip_push=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Failed to fetch from CodeCommit:"
            cat /tmp/fetch.err
            exit 1
          fi

          REMOTE_TREE=$(git rev-parse codecommit/${CODECOMMIT_BRANCH}^{tree})
          LOCAL_TREE="${{ steps.commit.outputs.local_tree }}"
          echo "Remote tree:   ${REMOTE_TREE}"
          echo "Local tree:    ${LOCAL_TREE}"

          if [ "${LOCAL_TREE}" = "${REMOTE_TREE}" ]; then
            echo "Trees match — no changes to push."
            echo "skip_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "Trees differ — push required."
            echo "skip_push=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Force-push the orphan snapshot. Force is required because each run
      # starts from a fresh history.
      # -----------------------------------------------------------------------
      - name: Push to CodeCommit
        id: push
        if: steps.idempotency.outputs.skip_push != 'true'
        working-directory: ${{ env.SYNC_STAGING_DIR }}
        run: |
          git push --force codecommit "HEAD:refs/heads/${CODECOMMIT_BRANCH}"
          PUSHED_SHA=$(git rev-parse HEAD)
          echo "pushed_sha=${PUSHED_SHA}" >> "$GITHUB_OUTPUT"
          echo "Pushed ${PUSHED_SHA} to codecommit/${CODECOMMIT_BRANCH}"

      # -----------------------------------------------------------------------
      # Diagnostics — only runs on failure to help distinguish auth errors
      # from repository access errors.
      # -----------------------------------------------------------------------
      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== STS caller identity ==="
          aws sts get-caller-identity || true
          echo "=== CodeCommit repo metadata ==="
          aws codecommit get-repository \
            --repository-name "${CODECOMMIT_REPO_NAME}" \
            --region "${AWS_REGION}" || true

      # -----------------------------------------------------------------------
      # Step summary — always runs so skipped and failed runs are also
      # visible at a glance.
      # -----------------------------------------------------------------------
      - name: Write step summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          SKIP_PUSH: ${{ steps.idempotency.outputs.skip_push }}
          PUSHED_SHA: ${{ steps.push.outputs.pushed_sha }}
        run: |
          {
            echo "# Vue.js Admin Dashboard — Deploy"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Status | ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} |"
            echo "| Source Commit | \`${COMMIT_SHA}\` |"
            echo "| Actor | @${{ github.actor }} |"
            if [ "${SKIP_PUSH}" = "true" ]; then
              echo "| Result | No changes — already in sync |"
            else
              echo "| CodeCommit Commit | \`${PUSHED_SHA:-unknown}\` |"
            fi
            echo "| CodeCommit Repo | \`${CODECOMMIT_REPO_NAME}\` (${AWS_REGION}) |"
            echo "| Console | [Open in AWS](https://${AWS_REGION}.console.aws.amazon.com/codesuite/codecommit/repositories/${CODECOMMIT_REPO_NAME}/browse?region=${AWS_REGION}) |"
            echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
