name: Sync aws-s3-web source to Production S3 Bucket

on:
  push:
    branches:
      - main
    paths:
      - "src/aws-s3-web/**"
      - ".github/workflows/aws-s3-web-sync-prod.yml"

  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "src/aws-s3-web/**"

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deployment"
        required: false
        default: "Manual deployment triggered"
        type: string

  schedule:
    - cron: "0 18 * * *"

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.11"
  S3_BUCKET: "s3.nghuy.link"
  CLOUDFRONT_DISTRIBUTION_ID: "E3MGWTP58YX35G"

jobs:
  run_job_with_aws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@main # Or a specific version
        with:
          role-to-assume: arn:aws:iam::010382427026:role/github-actions-s3-sync-role
          aws-region: ap-southeast-1

      - name: Additional steps
        run: |
          # Your commands that require AWS credentials
          aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "ops/requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 requests

      - name: Refresh pinned repos data
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ops/fetch_pinned_repos.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11"

      - name: Install site dependencies
        working-directory: src/aws-s3-web
        run: pnpm install --frozen-lockfile

      - name: Build static export
        working-directory: src/aws-s3-web
        run: pnpm build

      - name: Sync aws-s3-web build output to S3 Bucket
        id: sync
        run: |
          echo "Starting S3 sync at $(date)" | tee -a workflow.log

          aws s3 sync src/aws-s3-web/out/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=3600" 2>&1 | tee -a workflow.log

          SYNC_EXIT_CODE=${PIPESTATUS[0]}

          if [ $SYNC_EXIT_CODE -eq 0 ]; then
            echo "✅ Successfully synced src/aws-s3-web/out to s3://${{ env.S3_BUCKET }}" | tee -a workflow.log
            echo "sync_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Sync failed with exit code $SYNC_EXIT_CODE" | tee -a workflow.log
            echo "sync_status=failed" >> $GITHUB_OUTPUT
            exit $SYNC_EXIT_CODE
          fi

          echo "Completed at $(date)" | tee -a workflow.log

      - name: Invalidate CloudFront cache
        id: invalidate
        if: steps.sync.outputs.sync_status == 'success'
        run: |
          echo "Creating CloudFront invalidation for distribution ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" | tee -a workflow.log

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text 2>&1 | tee -a workflow.log)

          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "✅ Created invalidation $INVALIDATION_ID" | tee -a workflow.log

      - name: Upload Workflow Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-log-${{ github.run_number }}
          path: workflow.log
          retention-days: 30

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "# 📊 S3 Sync Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Workflow Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket:** \`${{ env.S3_BUCKET }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** \`ap-southeast-1\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.sync.outputs.sync_status }}" == "success" ]; then
            echo "## ✅ Sync Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Sync Status: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 🌀 CloudFront Invalidation" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.invalidate.outputs.invalidation_id }}" ]; then
            echo "- **Invalidation ID:** \`${{ steps.invalidate.outputs.invalidation_id }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Skipped (sync did not succeed)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 📝 Workflow Log" >> $GITHUB_STEP_SUMMARY
          echo "📥 [Download Full Workflow Log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [S3 Bucket Console](https://s3.console.aws.amazon.com/s3/buckets/${{ env.S3_BUCKET }})" >> $GITHUB_STEP_SUMMARY
          echo "- [nghuy.link](https://nghuy.link)" >> $GITHUB_STEP_SUMMARY
