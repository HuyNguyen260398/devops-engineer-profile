name: Blog CI

on:
  pull_request:
    paths:
      - "src/blog-backend/**"
      - "src/aws-s3-web/**"
      - ".github/workflows/blog-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/blog-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/blog-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/aws-s3-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/aws-s3-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - env:
          NEXT_PUBLIC_USER_POOL_ID: placeholder
          NEXT_PUBLIC_USER_POOL_CLIENT_ID: placeholder
        run: pnpm build
