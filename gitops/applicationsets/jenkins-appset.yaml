# ============================================================================
# Jenkins ApplicationSet
# ============================================================================
# Automatically generates ArgoCD Applications for Jenkins tenants
# by scanning the directory structure in the gitops repository.
#
# This ApplicationSet uses the Git Directory generator to discover
# tenant directories and creates an Application for each one.
#
# Directory structure expected:
#   gitops/application-plane/{environment}/tenants/{tier}/{tenant}.yaml
#
# The ApplicationSet watches for new directories/files and automatically
# creates or removes ArgoCD Applications accordingly.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: jenkins-tenants
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins-tenants
    app.kubernetes.io/component: applicationset
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "Auto-discovers and manages Jenkins tenant deployments across environments"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    # ---- Production Premium Tenants ----
    - git:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        revision: main
        files:
          - path: "gitops/application-plane/production/tenants/premium/*.yaml"
        values:
          environment: production
          tier: premium
          syncPolicy: manual

    # ---- Production Advanced Tenants ----
    - git:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        revision: main
        files:
          - path: "gitops/application-plane/production/tenants/advanced/*.yaml"
        values:
          environment: production
          tier: advanced
          syncPolicy: automated

    # ---- Production Basic (Pooled) Tenants ----
    - git:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        revision: main
        files:
          - path: "gitops/application-plane/production/tenants/basic/*.yaml"
        values:
          environment: production
          tier: basic
          syncPolicy: automated

    # ---- Staging Advanced Tenants ----
    - git:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        revision: main
        files:
          - path: "gitops/application-plane/staging/tenants/advanced/*.yaml"
        values:
          environment: staging
          tier: advanced
          syncPolicy: automated

    # ---- Staging Basic Tenants ----
    - git:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        revision: main
        files:
          - path: "gitops/application-plane/staging/tenants/basic/*.yaml"
        values:
          environment: staging
          tier: basic
          syncPolicy: automated

    # ---- Local Basic Tenants ----
    - git:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        revision: HEAD
        files:
          - path: "gitops/application-plane/local/tenants/basic/*.yaml"
        values:
          environment: local
          tier: basic
          syncPolicy: automated

  template:
    metadata:
      name: "jenkins-{{ .path.basename }}-{{ .values.tier }}-{{ .values.environment }}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: jenkins
        app.kubernetes.io/instance: "jenkins-{{ .path.basename }}"
        app.kubernetes.io/component: ci-cd
        app.kubernetes.io/part-of: gitops-platform
        app.kubernetes.io/managed-by: applicationset
        tenant: "{{ .path.basename }}"
        tier: "{{ .values.tier }}"
        environment: "{{ .values.environment }}"
        generator: "applicationset"
      annotations:
        description: "Auto-generated by jenkins-tenants ApplicationSet"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: "{{ if eq .values.tier \"basic\" }}tenants{{ else }}applications{{ end }}"

      source:
        repoURL: https://github.com/your-org/devops-engineer-profile.git
        targetRevision: "{{ if eq .values.environment \"local\" }}HEAD{{ else }}main{{ end }}"
        path: "{{ .path.path }}"

      destination:
        server: https://kubernetes.default.svc

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
