# ============================================================================
# ArgoCD AppProject – Infrastructure Components
# ============================================================================
# Manages cluster-level infrastructure: monitoring, ingress controllers,
# cert-manager, external-secrets-operator, ArgoCD itself.
# Follows least-privilege by restricting allowed namespaces and resource types.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/name: infrastructure
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Infrastructure components (monitoring, ingress, cert-manager, etc.)"

  sourceRepos:
    - "*"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: argo-workflows

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: networking.k8s.io
      kind: IngressClass
    - group: storage.k8s.io
      kind: StorageClass
    # ── kube-prometheus-stack CRDs ────────────────────────────────────────────
    # Prometheus Operator custom resources (cluster-scoped)
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: PrometheusAgent
    - group: monitoring.coreos.com
      kind: Alertmanager
    - group: monitoring.coreos.com
      kind: ThanosRuler
    # Prometheus Operator in-namespace custom resources registered as cluster-wide
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: monitoring.coreos.com
      kind: Probe
    - group: monitoring.coreos.com
      kind: AlertmanagerConfig
    - group: monitoring.coreos.com
      kind: ScrapeConfig
    # Admission webhooks installed by the Prometheus Operator
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # Priority classes used by Prometheus / Alertmanager pods
    - group: scheduling.k8s.io
      kind: PriorityClass

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: infra-admin
      description: "Full access to infrastructure project"
      policies:
        - p, proj:infrastructure:infra-admin, applications, *, infrastructure/*, allow
    - name: infra-viewer
      description: "Read-only access to infrastructure project"
      policies:
        - p, proj:infrastructure:infra-viewer, applications, get, infrastructure/*, allow
