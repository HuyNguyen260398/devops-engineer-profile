# ============================================================================
# ArgoCD AppProject – Infrastructure Components
# ============================================================================
# Manages cluster-level infrastructure: monitoring, logging, ingress controllers,
# cert-manager, external-secrets-operator, ArgoCD itself.
# Follows least-privilege by restricting allowed namespaces and resource types.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/name: infrastructure
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Infrastructure components (monitoring, logging, ingress, cert-manager, etc.)"

  sourceRepos:
    - "*"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: monitoring
    # ── ELK Logging Stack (ECK) ─────────────────
    - server: https://kubernetes.default.svc
      namespace: elastic-system # ECK Operator
    - server: https://kubernetes.default.svc
      namespace: logging # Elasticsearch, Kibana, Fluent Bit
    # ── AWX Ansible Automation Platform ──────────
    - server: https://kubernetes.default.svc
      namespace: awx # AWX Operator + AWX instance
    # ─────────────────────────────────────────────
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: argo-workflows

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: networking.k8s.io
      kind: IngressClass
    - group: storage.k8s.io
      kind: StorageClass
    # ── kube-prometheus-stack CRDs ────────────────────────────────────────────
    # Prometheus Operator custom resources (cluster-scoped)
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: PrometheusAgent
    - group: monitoring.coreos.com
      kind: Alertmanager
    - group: monitoring.coreos.com
      kind: ThanosRuler
    # Prometheus Operator in-namespace custom resources registered as cluster-wide
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: monitoring.coreos.com
      kind: Probe
    - group: monitoring.coreos.com
      kind: AlertmanagerConfig
    - group: monitoring.coreos.com
      kind: ScrapeConfig
    # Admission webhooks installed by the Prometheus Operator
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # Priority classes used by Prometheus / Alertmanager pods
    - group: scheduling.k8s.io
      kind: PriorityClass
    # ── ECK Operator CRDs ────────────────────────────────────────────────
    # Elastic Cloud on Kubernetes custom resources (cluster-scoped)
    - group: elasticsearch.k8s.elastic.co
      kind: Elasticsearch
    - group: kibana.k8s.elastic.co
      kind: Kibana
    - group: beat.k8s.elastic.co
      kind: Beat
    - group: agent.k8s.elastic.co
      kind: Agent
    - group: apmserver.k8s.elastic.co
      kind: ApmServer
    - group: logstash.k8s.elastic.co
      kind: Logstash
    - group: maps.k8s.elastic.co
      kind: ElasticMapsServer
    - group: enterprisesearch.k8s.elastic.co
      kind: EnterpriseSearch
    # ECK Operator webhook (installed by eck-operator chart)
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    # ── AWX Operator CRDs ────────────────────────────────────────────────
    # Ansible Automation Platform custom resources (cluster-scoped)
    - group: awx.ansible.com
      kind: AWX
    - group: awx.ansible.com
      kind: AWXBackup
    - group: awx.ansible.com
      kind: AWXRestore

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: infra-admin
      description: "Full access to infrastructure project"
      policies:
        - p, proj:infrastructure:infra-admin, applications, *, infrastructure/*, allow
    - name: infra-viewer
      description: "Read-only access to infrastructure project"
      policies:
        - p, proj:infrastructure:infra-viewer, applications, get, infrastructure/*, allow
