# ============================================================================
# ArgoCD AppProject – Infrastructure Components
# ============================================================================
# Manages cluster-level infrastructure: monitoring, ingress controllers,
# cert-manager, external-secrets-operator, ArgoCD itself.
# Follows least-privilege by restricting allowed namespaces and resource types.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/name: infrastructure
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Infrastructure components (monitoring, ingress, cert-manager, etc.)"

  sourceRepos:
    - "*"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: argo-workflows

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: networking.k8s.io
      kind: IngressClass
    - group: storage.k8s.io
      kind: StorageClass

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: infra-admin
      description: "Full access to infrastructure project"
      policies:
        - p, proj:infrastructure:infra-admin, applications, *, infrastructure/*, allow
    - name: infra-viewer
      description: "Read-only access to infrastructure project"
      policies:
        - p, proj:infrastructure:infra-viewer, applications, get, infrastructure/*, allow
