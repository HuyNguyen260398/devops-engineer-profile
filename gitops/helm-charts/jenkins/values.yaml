# ============================================================================
# Jenkins Tenant Helm Chart - Default Values
# ============================================================================
# These are tier-agnostic default values. Each tier (basic, advanced, premium)
# overrides these via the ArgoCD Application values in the application-plane.
#
# Pattern: Single chart deployed multiple times with tier-specific values
# Reference: EKS SaaS GitOps Workshop - Lab 1 (App & Infra Blueprint)
# ============================================================================

# -- Tenant identifier (replaced per deployment)
tenantId: ""

# -- Tier level: basic | advanced | premium
tier: "basic"

# -- Environment: local | staging | production
environment: "local"

# -- Jenkins sub-chart values (tier-agnostic defaults)
jenkins:
  enabled: true

  controller:
    componentName: "jenkins-controller"
    image:
      registry: "docker.io"
      repository: "jenkins/jenkins"
      tag: "2.440-jdk17"
      pullPolicy: "IfNotPresent"

    # Admin - expect external secret in staging/production
    adminUser: "admin"

    # Default resource allocation (overridden per tier)
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"

    # Java options (conservative defaults)
    javaOpts: >-
      -Xmx1536m
      -Xms1024m
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=100
      -XX:+UseStringDeduplication
      -Dhudson.slaves.NodeProvisioner.initialDelay=0
      -Dhudson.slaves.NodeProvisioner.MARGIN=50
      -Dhudson.slaves.NodeProvisioner.MARGIN0=0.85
      -Djenkins.model.Jenkins.slaveAgentPort=50000
      -Djenkins.install.runSetupWizard=false
      -Djava.awt.headless=true

    # No executors on controller (use agents)
    numExecutors: 0

    # Default service type
    serviceType: ClusterIP

    # Core plugins (shared across all tiers)
    installPlugins:
      - kubernetes:4252.v6f6f9050e0e4
      - workflow-aggregator:600.vb_57cdd26fdd7
      - git:5.2.2
      - configuration-as-code:1850.va_a_8c31d3158b_
      - credentials-binding:670.v857b_6d8d5909

    additionalPlugins: []

    # Jenkins Configuration as Code
    JCasC:
      defaultConfig: true
      configScripts:
        welcome-message: |
          jenkins:
            systemMessage: "Jenkins managed by GitOps - Do not modify manually"
        security-config: |
          jenkins:
            securityRealm:
              local:
                allowsSignup: false
            authorizationStrategy:
              loggedInUsersCanDoAnything:
                allowAnonymousRead: false

    # Security context
    podSecurityContextOverride:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    # Probes
    healthProbes: true
    probes:
      startupProbe:
        httpGet:
          path: "/login"
          port: http
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 12
      livenessProbe:
        httpGet:
          path: "/login"
          port: http
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 5
      readinessProbe:
        httpGet:
          path: "/login"
          port: http
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

    # Ingress (disabled by default, enabled per tier)
    ingress:
      enabled: false

  # Agent configuration
  agent:
    enabled: true
    resources:
      requests:
        cpu: "256m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    maxRequestsPerHostStr: "10"

  # Persistence
  persistence:
    enabled: true
    size: "8Gi"
