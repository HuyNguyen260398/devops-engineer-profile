# ============================================================================
# Pooled Environment - Pool 1
# ============================================================================
# Shared Jenkins instance for Basic tier tenants. All basic tenants route
# through this pooled Jenkins deployment. Multiple pools can be created
# for sharding (pool-2, pool-3, etc.) to reduce blast radius.
#
# Pattern: Pool Environment from EKS SaaS GitOps Workshop (Lab 2)
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: pool-1
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: pool-1
    app.kubernetes.io/managed-by: argocd
    pool: "pool-1"
    tier: basic
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pool-1-jenkins
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: pool-1
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    pool: pool-1
    tier: basic
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    description: "Shared pooled Jenkins for basic tier tenants"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications

  source:
    repoURL: https://github.com/your-org/devops-engineer-profile.git
    targetRevision: HEAD
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: pool-1-jenkins
      values: |
        tenantId: "pool-1"
        tier: "basic"
        environment: "production"
        jenkins:
          enabled: true
          controller:
            image:
              tag: "2.440-jdk17"
            resources:
              requests:
                cpu: "1"
                memory: "2Gi"
              limits:
                cpu: "4"
                memory: "4Gi"
            javaOpts: >-
              -Xmx3072m
              -Xms2048m
              -XX:+UseG1GC
              -XX:MaxGCPauseMillis=100
              -Dhudson.slaves.NodeProvisioner.initialDelay=0
              -Dhudson.slaves.NodeProvisioner.MARGIN=50
              -Djenkins.model.Jenkins.slaveAgentPort=50000
              -Djenkins.install.runSetupWizard=false
            serviceType: ClusterIP
            adminSecret: true
            existingSecret: "jenkins-admin-credentials"
            installPlugins:
              - kubernetes:4252.v6f6f9050e0e4
              - workflow-aggregator:600.vb_57cdd26fdd7
              - git:5.2.2
              - configuration-as-code:1850.va_a_8c31d3158b_
              - credentials-binding:670.v857b_6d8d5909
              - prometheus:2.5.0
            # Ingress disabled at pool level - individual tenant ingress routes traffic
            ingress:
              enabled: false
          agent:
            enabled: true
            resources:
              requests:
                cpu: "256m"
                memory: "512Mi"
              limits:
                cpu: "2"
                memory: "2Gi"
            maxRequestsPerHostStr: "30"
          persistence:
            enabled: true
            size: "50Gi"
            storageClass: "gp3"

  destination:
    server: https://kubernetes.default.svc
    namespace: pool-1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
