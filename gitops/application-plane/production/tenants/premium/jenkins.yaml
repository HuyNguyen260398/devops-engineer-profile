# ============================================================================
# Jenkins - Premium Tier Tenant Deployment (Production)
# ============================================================================
# First service deployed using the GitOps tier strategy.
# Jenkins gets fully dedicated resources as a Premium tier tenant.
#
# Created from: tier-templates/premium_tenant_template.yaml
# Tenant ID: jenkins-production
# Tier: premium (silo/dedicated)
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: jenkins-production
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: jenkins-production
    app.kubernetes.io/version: "2.440"
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    tenant: jenkins-production
    tier: premium
    environment: production
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-production-premium
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: jenkins-production
    app.kubernetes.io/version: "2.440"
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    tenant: jenkins-production
    tier: premium
    environment: production
    critical: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    notifications.argoproj.io/subscribe.on-deployed.slack: "devops-production"
    notifications.argoproj.io/subscribe.on-health-degraded.slack: "devops-critical-alerts"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: "devops-critical-alerts"
    description: "Jenkins CI/CD - Premium tier production deployment"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications

  source:
    repoURL: https://github.com/your-org/devops-engineer-profile.git
    targetRevision: main
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: jenkins-production-premium
      values: |
        tenantId: "jenkins-production"
        tier: "premium"
        environment: "production"
        jenkins:
          enabled: true
          controller:
            componentName: "jenkins-controller"
            image:
              registry: "docker.io"
              repository: "jenkins/jenkins"
              tag: "2.440-jdk17"
              pullPolicy: "IfNotPresent"
            resources:
              requests:
                cpu: "2"
                memory: "4Gi"
              limits:
                cpu: "8"
                memory: "8Gi"
            javaOpts: >-
              -Xmx6144m
              -Xms4096m
              -XX:+UseG1GC
              -XX:MaxGCPauseMillis=100
              -XX:+UseStringDeduplication
              -XX:+ParallelRefProcEnabled
              -XX:+DisableExplicitGC
              -XX:+UnlockExperimentalVMOptions
              -XX:G1NewSizePercent=20
              -XX:+UnlockDiagnosticVMOptions
              -Dhudson.slaves.NodeProvisioner.initialDelay=0
              -Dhudson.slaves.NodeProvisioner.MARGIN=50
              -Dhudson.slaves.NodeProvisioner.MARGIN0=0.85
              -Djenkins.model.Jenkins.slaveAgentPort=50000
              -Djenkins.model.Jenkins.slaveAgentPortEnforce=true
              -Djenkins.install.runSetupWizard=false
              -Djava.awt.headless=true
            numExecutors: 0
            serviceType: LoadBalancer
            serviceAnnotations:
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
              service.beta.kubernetes.io/aws-load-balancer-internal: "true"
              service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
              service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
              service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "3600"
              service.beta.kubernetes.io/aws-load-balancer-access-log-enabled: "true"
              service.beta.kubernetes.io/aws-load-balancer-access-log-s3-bucket-name: "jenkins-prod-lb-logs"
            adminUser: "admin"
            adminSecret: true
            existingSecret: "jenkins-admin-credentials"
            jenkinsUrl: "https://jenkins.example.com"
            jenkinsUriPrefix: "/"
            ingress:
              enabled: true
              annotations:
                kubernetes.io/ingress.class: "nginx"
                cert-manager.io/cluster-issuer: "letsencrypt-prod"
                nginx.ingress.kubernetes.io/ssl-redirect: "true"
                nginx.ingress.kubernetes.io/proxy-body-size: "50m"
              hostName: "jenkins.example.com"
              tls:
                - secretName: jenkins-production-tls
                  hosts:
                    - "jenkins.example.com"
            installPlugins:
              - kubernetes:4252.v6f6f9050e0e4
              - workflow-aggregator:600.vb_57cdd26fdd7
              - git:5.2.2
              - configuration-as-code:1850.va_a_8c31d3158b_
              - credentials-binding:670.v857b_6d8d5909
              - blueocean:1.27.14
              - prometheus:2.5.0
              - github-branch-source:1797.v86fdb_4d57d43
              - pipeline-stage-view:2.34
              - docker-workflow:580.vc0c340686b_54
              - kubernetes-credentials-provider:1.262.v2670ef7ea_0c5
              - role-strategy:727.vd344b_eec783d
              - matrix-auth:3.2.2
              - amazon-ecr:2.2
              - aws-credentials:218.v1b_e9466ec5da_
            additionalPlugins:
              - job-dsl:1.87
              - pipeline-utility-steps:2.17.0
              - http_request:1.18
              - ansicolor:1.0.4
              - timestamper:1.26
              - ws-cleanup:0.45
              - audit-trail:3.11.0
              - authorize-project:1.7.2
            JCasC:
              defaultConfig: true
              configScripts:
                welcome-message: |
                  jenkins:
                    systemMessage: "Jenkins Production - Managed by GitOps. Do NOT modify manually."
                security-config: |
                  jenkins:
                    securityRealm:
                      local:
                        allowsSignup: false
                    authorizationStrategy:
                      roleBased:
                        roles:
                          globalRoles:
                            - name: "admin"
                              permissions:
                                - "Overall/Administer"
                              entries:
                                - user: "admin"
                            - name: "developer"
                              permissions:
                                - "Overall/Read"
                                - "Job/Build"
                                - "Job/Read"
                                - "Job/Workspace"
                              entries:
                                - group: "developers"
                            - name: "reader"
                              permissions:
                                - "Overall/Read"
                                - "Job/Read"
                              entries:
                                - group: "authenticated"
            podSecurityContextOverride:
              runAsNonRoot: true
              runAsUser: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containerSecurityContext:
              runAsUser: 1000
              runAsGroup: 1000
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          agent:
            enabled: true
            resources:
              requests:
                cpu: "1"
                memory: "1Gi"
              limits:
                cpu: "4"
                memory: "4Gi"
            maxRequestsPerHostStr: "50"
          persistence:
            enabled: true
            size: "100Gi"
            storageClass: "gp3"

  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-production

  syncPolicy:
    # Premium production = MANUAL sync for safety
    automated: null
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
