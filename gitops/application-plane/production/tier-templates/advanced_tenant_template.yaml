# ============================================================================
# Advanced Tier Tenant Template – Production Environment
# ============================================================================
# Blueprint for onboarding a new advanced-tier Jenkins tenant (production).
# Advanced tier: dedicated namespace + controller, shared agents.
#
# USAGE:
#   1. Copy to: gitops/application-plane/production/tenants/advanced/<TENANT_NAME>.yaml
#   2. Replace all TENANT_* placeholders
#   3. Add the filename to: gitops/application-plane/production/tenants/advanced/kustomization.yaml
#   4. Commit and push – ArgoCD auto-syncs
#
# Tier:        advanced (dedicated namespace: jenkins-TENANT_NAME-production)
# Environment: production
# Resources:   500m–2 CPU | 1–2Gi mem | 20Gi gp3
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: TENANT_NAME-advanced-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: TENANT_NAME
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: tenant
    tier: advanced
    tenant: TENANT_NAME
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-critical-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git  # UPDATE THIS
    targetRevision: HEAD
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: TENANT_NAME-advanced-production
      values: |
        jenkins:
          controller:
            serviceType: ClusterIP
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "2"
                memory: "2Gi"
            JCasC:
              configScripts:
                welcome-message: |
                  jenkins:
                    systemMessage: "Jenkins Production \u2013 Advanced Tier \u2013 TENANT_NAME"
            persistence:
              storageClass: "gp3"
              size: "20Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-TENANT_NAME-production  # Dedicated namespace per advanced tenant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: ""
      kind: Secret
      name: jenkins-admin-credentials
      jsonPointers:
        - /data
