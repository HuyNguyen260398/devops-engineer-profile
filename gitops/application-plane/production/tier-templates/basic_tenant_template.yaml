# ============================================================================
# Basic Tier Template - Pool Deployment
# ============================================================================
# Basic tier tenants share a pooled Jenkins instance. Resources are shared
# across multiple tenants for cost efficiency.
#
# Pattern: Pool/Shared model from EKS SaaS GitOps Workshop (Lab 2)
# The tenant gets an Ingress route pointing to the pooled environment
# but does NOT get a dedicated Jenkins deployment.
#
# Variables to replace:
#   {TENANT_ID}        - Unique tenant identifier
#   {RELEASE_VERSION}  - Helm chart version to deploy
#   {POOL_ENV}         - Target pool environment (e.g., pool-1)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {TENANT_ID}-basic
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: {TENANT_ID}
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    tenant: {TENANT_ID}
    tier: basic
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    description: "Basic tier tenant - shared pooled Jenkins"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications

  source:
    repoURL: https://github.com/your-org/devops-engineer-profile.git
    targetRevision: HEAD
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: {TENANT_ID}-basic
      values: |
        tenantId: "{TENANT_ID}"
        tier: "basic"
        environment: "production"
        jenkins:
          enabled: false  # No dedicated Jenkins - uses pooled instance
          # Basic tier tenants route to the pooled Jenkins in {POOL_ENV}

  destination:
    server: https://kubernetes.default.svc
    namespace: {POOL_ENV}  # Deploy into shared pool namespace

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
