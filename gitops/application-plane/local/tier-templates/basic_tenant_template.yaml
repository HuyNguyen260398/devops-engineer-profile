# ============================================================================
# Basic Tier Tenant Template – Local Environment
# ============================================================================
# Blueprint for onboarding a new basic-tier Jenkins tenant (local).
#
# USAGE (onboarding workflow / manual):
#   1. Copy to: gitops/application-plane/local/tenants/basic/<TENANT_NAME>.yaml
#   2. Replace all TENANT_* placeholders with real values
#   3. Choose a unique TENANT_NODE_PORT (32002–32099)
#   4. Add the filename to: gitops/application-plane/local/tenants/basic/kustomization.yaml
#   5. Commit and push – ArgoCD auto-syncs
#
# Tier:        basic (shared pool-1-local namespace)
# Environment: local
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: TENANT_NAME-basic-local          # e.g. acme-corp-basic-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: TENANT_NAME
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: tenant
    tier: basic
    tenant: TENANT_NAME
    environment: local
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git  # UPDATE THIS
    targetRevision: feature/deploy-and-manage-jenkins-in-argocd
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: TENANT_NAME-basic-local
      values: |
        jenkins:
          controller:
            serviceType: NodePort
            nodePort: TENANT_NODE_PORT    # Unique port: 32002-32099
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
              limits:
                cpu: "1"
                memory: "1Gi"
            JCasC:
              configScripts:
                welcome-message: |
                  jenkins:
                    systemMessage: "Jenkins Local \u2013 Basic Tier \u2013 TENANT_NAME"
            persistence:
              storageClass: "standard"
              size: "8Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: pool-1-local             # All basic tier tenants share this namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
