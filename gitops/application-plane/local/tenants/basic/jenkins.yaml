# ============================================================================
# Jenkins – Basic Tier (Local Environment)
# ============================================================================
# Deploys a Jenkins instance in the shared pool-1-local namespace.
# Basic tier tenants share pool infrastructure without dedicated controllers.
#
# Namespace:  pool-1-local (shared)
# Tier:       basic
# Sync:       Automated
# Resources:  250m–1 CPU | 512Mi–1Gi mem
# Storage:    8Gi (standard)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-basic-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: tenant
    tier: basic
    tenant: jenkins
    environment: local
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git
    targetRevision: feature/deploy-and-manage-jenkins-in-argocd
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: jenkins-basic-local
      values: |
        jenkins:
          controller:
            serviceType: NodePort
            nodePort: 32001
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
              limits:
                cpu: "1"
                memory: "1Gi"
            JCasC:
              configScripts:
                welcome-message: |
                  jenkins:
                    systemMessage: "Jenkins Local \u2013 Basic Tier"
            persistence:
              storageClass: "standard"
              size: "8Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: pool-1-local
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
