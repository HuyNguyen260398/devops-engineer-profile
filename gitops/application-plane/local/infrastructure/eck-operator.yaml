# ============================================================================
# ECK Operator – Local Environment
# ============================================================================
# Deploys the Elastic Cloud on Kubernetes operator into the elastic-system
# namespace for local development (minikube / kind / k3s).
#
# Namespace:  elastic-system
# Project:    infrastructure
# Sync:       Automated
# Sync Wave:  -1  (MUST deploy before eck-stack at wave 0)
#
# Local overrides (relative to base values.yaml):
#   • resources:    reduced (local dev environment)
#   • log verbosity: 0 (info)
#   • telemetry:    disabled
#
# IMPORTANT – CRD size limit:
#   Replace=true + ServerSideApply=true are mandatory in syncOptions.
#   Without Replace=true, ArgoCD may fail with the 262 KiB annotation limit.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eck-operator-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: eck-operator
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: infrastructure
    environment: local
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    description: "ECK Operator – local environment (prerequisite for eck-stack)"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git # UPDATE THIS
    # targetRevision is set centrally via kustomization.yaml patches
    path: gitops/helm-charts/eck-operator
    helm:
      releaseName: eck-operator
      values: |
        eck-operator:
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          log:
            verbosity: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
