# ============================================================================
# awx-operator – Local Environment
# ============================================================================
# Deploys the AWX Operator and provisions an AWX instance in the awx namespace
# for local development (Docker Desktop / minikube / kind / k3s).
#
# Namespace:  awx
# Project:    infrastructure
# Sync:       Automated
# Sync Wave:  -1  (installs AWX CRDs before any workload that depends on them)
#
# Local overrides (relative to base values.yaml):
#   • AWX.enabled:         true       (provision AWX CR)
#   • service_type:        nodeport   (direct browser access)
#   • nodeport_port:       32080      (http://localhost:32080)
#   • storageClass:        hostpath   (Docker Desktop default)
#   • resources:           reduced    (minimal CPU/memory for local dev)
#   • postgresStorage:     8Gi        (local dev sizing)
#
# AWX Admin Password:
#   kubectl get secret awx-admin-password -n awx \
#     -o jsonpath='{.data.password}' | base64 -d && echo
#
# IMPORTANT – CRD size limit:
#   Replace=true + ServerSideApply=true are mandatory in syncOptions.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-operator-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: awx-operator
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: infrastructure
    environment: local
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    description: "AWX Ansible Automation Platform – local environment"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git  # UPDATE THIS
    # targetRevision is set centrally via kustomization.yaml patches
    path: gitops/helm-charts/awx-operator
    helm:
      releaseName: awx-operator
      values: |
        awx-operator:
          AWX:
            enabled: true
            name: awx
            spec:
              admin_user: admin
              # ── Service ─────────────────────────────────────────────────
              # NodePort for direct local browser access
              service_type: nodeport
              nodeport_port: 32080

              # ── Storage (Docker Desktop hostpath) ────────────────────────
              postgres_storage_class: hostpath
              postgres_storage_requirements:
                requests:
                  storage: "8Gi"

              # ── Web Container ────────────────────────────────────────────
              web_resource_requirements:
                requests:
                  cpu: "100m"
                  memory: "512Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"

              # ── Task Container ───────────────────────────────────────────
              task_resource_requirements:
                requests:
                  cpu: "100m"
                  memory: "512Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"

              # ── Execution Environment Container ──────────────────────────
              ee_resource_requirements:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "200m"
                  memory: "512Mi"

              # ── Redis (avoid docker.io pull failures on local cluster) ────
              redis_image: quay.io/sclorg/redis-7-c9s
              redis_image_version: latest

              # ── Security Context (PSS restricted-aligned) ────────────────
              security_context_settings:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault

  destination:
    server: https://kubernetes.default.svc
    namespace: awx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true              # Required: CRD annotation size limit guard
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
