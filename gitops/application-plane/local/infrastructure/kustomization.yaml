# Local infrastructure components – cluster-wide observability and logging stacks
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - kube-prometheus-stack.yaml
  # ── ELK Logging Stack (ECK) ─────────────────────────────────────────────
  # Deploy order enforced via ArgoCD sync-wave annotations:
  #   wave -1: eck-operator  (CRDs + controller – must precede eck-stack)
  #   wave  0: eck-stack     (Elasticsearch + Kibana)
  #   wave  1: fluent-bit    (DaemonSet log forwarder)
  - eck-operator.yaml
  - eck-stack.yaml
  - fluent-bit.yaml

# ── Centralised targetRevision override ─────────────────────────────────────
# All child Application resources in this directory inherit targetRevision from
# this single patch. To test on a feature branch, change the value below and
# push — ArgoCD will auto-reconcile all four Applications to the new revision.
# When merging back to main, reset the value to 'main'.
patches:
  - target:
      group: argoproj.io
      kind: Application
    patch: |-
      - op: replace
        path: /spec/source/targetRevision
        value: feature/update-gitops-local-bootstrap
