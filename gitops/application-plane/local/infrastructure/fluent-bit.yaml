# ============================================================================
# Fluent Bit – Local Environment
# ============================================================================
# Deploys Fluent Bit as a DaemonSet into the logging namespace for local
# development (minikube / kind / k3s). Collects container logs from all
# nodes and forwards to the local Elasticsearch instance.
#
# Namespace:  logging
# Project:    infrastructure
# Sync:       Automated
# Sync Wave:  1  (requires eck-stack Elasticsearch at wave 0)
#
# Local overrides (relative to base values.yaml):
#   • resources:    minimal (local dev)
#   • TLS verify:   disabled (self-signed ECK cert accepted without verification)
#   • Log level:    info
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: infrastructure
    environment: local
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    description: "Fluent Bit log collector – local environment"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git # UPDATE THIS
    # targetRevision is set centrally via kustomization.yaml patches
    path: gitops/helm-charts/fluent-bit
    helm:
      releaseName: fluent-bit
      values: |
        fluent-bit:
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
