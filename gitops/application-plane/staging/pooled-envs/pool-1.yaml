# ============================================================================
# Pool-1 – Shared Jenkins Pool (Staging Environment, Basic Tier)
# ============================================================================
# Deploys a single shared Jenkins controller + agents for all basic-tier
# tenants in the staging environment.
#
# Namespace:  pool-1-staging
# Tier:       basic (shared pool)
# Sync:       Automated
#
# Apply during bootstrap:
#   kubectl apply -f gitops/application-plane/staging/pooled-envs/pool-1.yaml
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-pool-1-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins-pool-1
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: pooled-env
    tier: basic
    pool: pool-1
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  source:
    repoURL: https://github.com/your-org/devops-engineer-profile.git  # UPDATE THIS
    targetRevision: HEAD
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: jenkins-pool-1
      values: |
        jenkins:
          controller:
            serviceType: ClusterIP
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
              limits:
                cpu: "1"
                memory: "1Gi"
            JCasC:
              configScripts:
                welcome-message: |
                  jenkins:
                    systemMessage: "Jenkins Staging Pool-1 \u2013 Shared Basic Tier"
            persistence:
              storageClass: "gp3"
              size: "20Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: pool-1-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: ""
      kind: Secret
      name: jenkins-admin-credentials
      jsonPointers:
        - /data
