# ============================================================================
# kube-prometheus-stack – Staging Environment
# ============================================================================
# Deploys the cluster observability stack into the monitoring namespace for
# staging (AWS EKS). Mirrors the production configuration with reduced
# resources and a shorter retention window for cost control.
#
# Namespace:  monitoring
# Project:    infrastructure
# Sync:       Automated
# Sync Wave:  0  (deploys before all tenant applications)
#
# Staging overrides (relative to base values.yaml):
#   • storageClass:   gp3   (AWS EKS)
#   • Prometheus:     retention 7d, 20Gi storage, medium resources
#   • Grafana:        ClusterIP (exposed via ALB Ingress), 5Gi storage
#   • Alertmanager:   enabled with staging Slack channel routing
#   • adminPassword:  set inline (staging – non-production credential)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: infrastructure
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
    description: "Cluster observability stack – staging environment"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git  # UPDATE THIS
    targetRevision: main
    path: gitops/helm-charts/kube-prometheus-stack
    helm:
      releaseName: kube-prometheus-stack
      values: |
        kube-prometheus-stack:
          # ── Prometheus ───────────────────────────────────────────────────
          prometheus:
            prometheusSpec:
              retention: "7d"
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "gp3"
                    resources:
                      requests:
                        storage: "20Gi"

          # ── Grafana ──────────────────────────────────────────────────────
          grafana:
            adminPassword: "staging-grafana-password"  # Replace with External Secrets ref
            service:
              type: ClusterIP
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"
            persistence:
              storageClassName: "gp3"
              size: "5Gi"
            grafana.ini:
              server:
                root_url: "https://grafana.staging.example.com/"  # UPDATE THIS

          # ── Alertmanager ─────────────────────────────────────────────────
          alertmanager:
            enabled: true
            alertmanagerSpec:
              replicas: 1
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "gp3"
                    resources:
                      requests:
                        storage: "2Gi"
            config:
              global:
                resolve_timeout: 5m
              route:
                group_by: ["alertname", "namespace"]
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 6h
                receiver: "slack-staging"
                routes:
                  - matchers:
                      - name: alertname
                        value: Watchdog
                    receiver: "null"
              receivers:
                - name: "null"
                - name: "slack-staging"
                  slack_configs:
                    - api_url: "https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK"  # UPDATE THIS
                      channel: "#devops-staging-alerts"
                      title: '[STAGING] {{ .GroupLabels.alertname }}'
                      text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

          # ── Prometheus Operator ──────────────────────────────────────────
          prometheusOperator:
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true              # Required: CRDs exceed 262 KiB annotation limit
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: monitoring.coreos.com
      kind: Prometheus
      jsonPointers:
        - /spec/replicas
    - group: monitoring.coreos.com
      kind: Alertmanager
      jsonPointers:
        - /spec/replicas
