# ============================================================================
# ECK Operator – Staging Environment
# ============================================================================
# Deploys the Elastic Cloud on Kubernetes operator into the elastic-system
# namespace for staging (AWS EKS).
#
# Namespace:  elastic-system
# Project:    infrastructure
# Sync:       Automated
# Sync Wave:  -1  (MUST deploy before eck-stack at wave 0)
#
# Staging overrides (relative to base values.yaml):
#   • resources:    production-aligned (medium tier)
#   • log verbosity: 0 (info)
#   • telemetry:    disabled
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eck-operator-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: eck-operator
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: infrastructure
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
    description: "ECK Operator – staging environment (prerequisite for eck-stack)"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git # UPDATE THIS
    targetRevision: main
    path: gitops/helm-charts/eck-operator
    helm:
      releaseName: eck-operator
      values: |
        eck-operator:
          resources:
            requests:
              cpu: "100m"
              memory: "150Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          log:
            verbosity: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
