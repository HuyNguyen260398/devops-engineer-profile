# ============================================================================
# ECK Stack (Elasticsearch + Kibana) – Staging Environment
# ============================================================================
# Deploys Elasticsearch (3-node cluster) and Kibana into the logging namespace
# for staging (AWS EKS). Production-mirrored configuration with reduced sizing.
#
# Namespace:  logging
# Project:    infrastructure
# Sync:       Automated
# Sync Wave:  0  (requires ECK Operator at wave -1)
#
# Staging overrides (relative to base values.yaml):
#   • storageClass:    gp3   (AWS EKS)
#   • Elasticsearch:   3 nodes, 1Gi JVM heap, 30Gi gp3 storage per node
#   • Kibana:          2 replicas, ClusterIP (exposed via ALB Ingress)
#   • TLS:             self-signed (ECK managed)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eck-stack-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: eck-stack
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: infrastructure
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
    description: "Elasticsearch + Kibana logging stack – staging environment"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git # UPDATE THIS
    targetRevision: main
    path: gitops/helm-charts/eck-stack
    helm:
      releaseName: eck-stack
      values: |
        eck-stack:
          eck-elasticsearch:
            enabled: true
            spec:
              nodeSets:
                - name: default
                  count: 3
                  config:
                    node.store.allow_mmap: false
                  podTemplate:
                    spec:
                      containers:
                        - name: elasticsearch
                          resources:
                            requests:
                              cpu: "500m"
                              memory: "2Gi"
                            limits:
                              cpu: "2000m"
                              memory: "4Gi"
                          env:
                            - name: ES_JAVA_OPTS
                              value: "-Xms1g -Xmx1g"
                  volumeClaimTemplates:
                    - metadata:
                        name: elasticsearch-data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: "30Gi"
                        storageClassName: "gp3"

          eck-kibana:
            enabled: true
            spec:
              count: 2
              podTemplate:
                spec:
                  containers:
                    - name: kibana
                      resources:
                        requests:
                          cpu: "200m"
                          memory: "512Mi"
                        limits:
                          cpu: "500m"
                          memory: "1Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
