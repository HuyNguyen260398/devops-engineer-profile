# ============================================================================
# Advanced Tier Tenant Template - Staging
# ============================================================================
# Hybrid deployment: dedicated Jenkins controller, shared agents.
# This tier provides a good balance between isolation and cost efficiency.
#
# Placeholder variables:
#   {TENANT_ID}       - Unique identifier for the tenant
#   {RELEASE_VERSION} - Version of the helm chart to deploy
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: "{TENANT_ID}"
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: "{TENANT_ID}"
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    tenant: "{TENANT_ID}"
    tier: advanced
    environment: staging
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{TENANT_ID}-advanced"
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: "{TENANT_ID}"
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    tenant: "{TENANT_ID}"
    tier: advanced
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: "devops-staging"
    description: "Advanced tier tenant - hybrid deployment (staging)"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications

  source:
    repoURL: https://github.com/your-org/devops-engineer-profile.git
    targetRevision: main
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: "{TENANT_ID}-advanced"
      values: |
        tenantId: "{TENANT_ID}"
        tier: "advanced"
        environment: "staging"
        jenkins:
          enabled: true
          controller:
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "2"
                memory: "2Gi"
            javaOpts: >-
              -Xmx1536m
              -Xms512m
              -XX:+UseG1GC
              -Djenkins.install.runSetupWizard=false
              -Djava.awt.headless=true
            numExecutors: 0
            serviceType: ClusterIP
            installPlugins:
              - kubernetes:4252.v6f6f9050e0e4
              - workflow-aggregator:600.vb_57cdd26fdd7
              - git:5.2.2
              - configuration-as-code:1850.va_a_8c31d3158b_
              - credentials-binding:670.v857b_6d8d5909
              - prometheus:2.5.0
              - pipeline-stage-view:2.34
            JCasC:
              defaultConfig: true
            podSecurityContextOverride:
              runAsNonRoot: true
              runAsUser: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containerSecurityContext:
              runAsUser: 1000
              runAsGroup: 1000
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          agent:
            enabled: true
            resources:
              requests:
                cpu: "500m"
                memory: "512Mi"
              limits:
                cpu: "2"
                memory: "2Gi"
          persistence:
            enabled: true
            size: "20Gi"
            storageClass: "gp3"

  destination:
    server: https://kubernetes.default.svc
    namespace: "{TENANT_ID}"

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
