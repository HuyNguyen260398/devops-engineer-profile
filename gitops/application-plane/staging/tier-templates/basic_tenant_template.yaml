# ============================================================================
# Basic Tier Tenant Template – Staging Environment
# ============================================================================
# Blueprint for onboarding a new basic-tier Jenkins tenant (staging).
#
# USAGE:
#   1. Copy to: gitops/application-plane/staging/tenants/basic/<TENANT_NAME>.yaml
#   2. Replace all TENANT_* placeholders
#   3. Add the filename to: gitops/application-plane/staging/tenants/basic/kustomization.yaml
#   4. Commit and push – ArgoCD auto-syncs
#
# Tier:        basic (shared pool-1-staging namespace)
# Environment: staging
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: TENANT_NAME-basic-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: TENANT_NAME
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: tenant
    tier: basic
    tenant: TENANT_NAME
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  source:
    repoURL: https://github.com/HuyNguyen260398/devops-engineer-profile.git  # UPDATE THIS
    targetRevision: HEAD
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: TENANT_NAME-basic-staging
      values: |
        jenkins:
          controller:
            serviceType: ClusterIP
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
              limits:
                cpu: "1"
                memory: "1Gi"
            JCasC:
              configScripts:
                welcome-message: |
                  jenkins:
                    systemMessage: "Jenkins Staging \u2013 Basic Tier \u2013 TENANT_NAME"
            persistence:
              storageClass: "gp3"
              size: "20Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: pool-1-staging             # All basic tier tenants share this namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: ""
      kind: Secret
      name: jenkins-admin-credentials
      jsonPointers:
        - /data
