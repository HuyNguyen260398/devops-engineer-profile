# ============================================================================
# Basic Tier Tenant Template - Staging
# ============================================================================
# Pool-based shared Jenkins instance for basic tier tenants.
# In staging, basic tenants share the pooled jenkins in pool-1.
#
# Placeholder variables:
#   {TENANT_ID}       - Unique identifier for the tenant
#   {RELEASE_VERSION} - Version of the helm chart to deploy
#   {POOL_ENV}        - Pool environment namespace (e.g., pool-1-staging)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{TENANT_ID}-basic"
  namespace: argocd
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: "{TENANT_ID}"
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
    tenant: "{TENANT_ID}"
    tier: basic
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    description: "Basic tier tenant - shared pool deployment (staging)"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants

  source:
    repoURL: https://github.com/your-org/devops-engineer-profile.git
    targetRevision: main
    path: gitops/helm-charts/jenkins
    helm:
      releaseName: "{TENANT_ID}-basic"
      values: |
        tenantId: "{TENANT_ID}"
        tier: "basic"
        environment: "staging"
        jenkins:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: "{POOL_ENV}"

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
