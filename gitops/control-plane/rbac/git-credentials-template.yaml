# ============================================================================
# Git Credentials Secret Template
# ============================================================================
# This secret is used by onboarding/offboarding/deployment workflows
# to commit changes back to the Git repository.
#
# IMPORTANT: Do NOT commit actual credentials.
# Use sealed-secrets, external-secrets, or SOPS to manage this in production.
#
# For AWS EKS with IRSA:
#   Use a GitHub App or fine-grained personal access token
#   stored in AWS Secrets Manager, fetched by External Secrets Operator.
#
# Manual creation:
#   kubectl create secret generic git-credentials \
#     -n argo-workflows \
#     --from-literal=username=git-bot \
#     --from-literal=token=ghp_xxxxxxxxxxxx
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: argo-workflows
  labels:
    app.kubernetes.io/name: git-credentials
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "Git credentials for workflow automation. Replace with ExternalSecret in production."
type: Opaque
stringData:
  username: "REPLACE_WITH_GIT_USERNAME"
  token: "REPLACE_WITH_GIT_TOKEN"
