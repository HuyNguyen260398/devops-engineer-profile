# ============================================================================
# Tenant Onboarding Workflow Template
# ============================================================================
# Argo Workflow that automates the onboarding of a new tenant.
# Based on Lab 3 of the AWS EKS SaaS GitOps Workshop, adapted for ArgoCD.
#
# This workflow:
#   1. Validates input parameters (tenant ID, tier, environment)
#   2. Generates tenant manifest from tier template
#   3. Commits manifest to the gitops repository
#   4. ArgoCD auto-syncs to create tenant resources
#
# Usage:
#   argo submit onboarding-workflow.yaml \
#     -p tenant-id=acme-corp \
#     -p tier=advanced \
#     -p environment=production \
#     -p release-version=1.0.0
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tenant-onboarding
  namespace: argo-workflows
  labels:
    app.kubernetes.io/name: tenant-onboarding
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "Automated tenant onboarding workflow"
spec:
  entrypoint: onboard-tenant
  serviceAccountName: gitops-workflow-sa

  arguments:
    parameters:
      - name: tenant-id
        description: "Unique identifier for the tenant (lowercase, alphanumeric with hyphens)"
      - name: tier
        description: "Tier strategy: basic, advanced, or premium"
        enum:
          - basic
          - advanced
          - premium
      - name: environment
        description: "Target environment"
        enum:
          - local
          - staging
          - production
      - name: release-version
        description: "Helm chart version to deploy"
        default: "1.0.0"
      - name: git-repo
        description: "Git repository URL"
        default: "https://github.com/your-org/devops-engineer-profile.git"
      - name: git-branch
        description: "Git branch to commit to"
        default: "main"

  templates:
    # ---- Main entrypoint ----
    - name: onboard-tenant
      steps:
        - - name: validate-input
            template: validate
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: tier
                  value: "{{workflow.parameters.tier}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"

        - - name: check-existing
            template: check-tenant-exists
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: tier
                  value: "{{workflow.parameters.tier}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"

        - - name: generate-manifest
            template: generate-tenant-manifest
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: tier
                  value: "{{workflow.parameters.tier}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"
                - name: release-version
                  value: "{{workflow.parameters.release-version}}"

        - - name: commit-to-git
            template: git-commit
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: tier
                  value: "{{workflow.parameters.tier}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"
                - name: manifest
                  value: "{{steps.generate-manifest.outputs.parameters.manifest}}"
              artifacts:
                - name: kustomization-patch
                  from: "{{steps.generate-manifest.outputs.artifacts.kustomization-patch}}"

        - - name: wait-for-sync
            template: verify-argocd-sync
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: tier
                  value: "{{workflow.parameters.tier}}"

    # ---- Validation step ----
    - name: validate
      inputs:
        parameters:
          - name: tenant-id
          - name: tier
          - name: environment
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -euo pipefail

          TENANT_ID="{{inputs.parameters.tenant-id}}"
          TIER="{{inputs.parameters.tier}}"
          ENV="{{inputs.parameters.environment}}"

          echo "=== Validating tenant onboarding request ==="
          echo "  Tenant ID:   ${TENANT_ID}"
          echo "  Tier:        ${TIER}"
          echo "  Environment: ${ENV}"

          # Validate tenant ID format
          if ! echo "${TENANT_ID}" | grep -qE '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'; then
            echo "ERROR: Invalid tenant ID format. Must be lowercase alphanumeric with hyphens, 3-63 chars."
            exit 1
          fi

          # Validate tier exists for environment
          case "${ENV}" in
            local)
              if [ "${TIER}" != "basic" ]; then
                echo "ERROR: Local environment only supports 'basic' tier."
                exit 1
              fi
              ;;
            staging)
              if [ "${TIER}" = "premium" ]; then
                echo "ERROR: Staging environment does not support 'premium' tier. Use 'basic' or 'advanced'."
                exit 1
              fi
              ;;
            production)
              # All tiers available
              ;;
          esac

          echo "=== Validation passed ==="

    # ---- Check if tenant already exists ----
    - name: check-tenant-exists
      inputs:
        parameters:
          - name: tenant-id
          - name: tier
          - name: environment
      script:
        image: bitnami/kubectl:1.29
        command: [sh]
        source: |
          set -euo pipefail

          TENANT_ID="{{inputs.parameters.tenant-id}}"
          TIER="{{inputs.parameters.tier}}"
          ENV="{{inputs.parameters.environment}}"
          APP_NAME="${TENANT_ID}-${TIER}"

          echo "Checking if ArgoCD application '${APP_NAME}' already exists..."

          if kubectl get application "${APP_NAME}" -n argocd >/dev/null 2>&1; then
            echo "ERROR: Tenant '${TENANT_ID}' already exists with tier '${TIER}'."
            echo "Use the deployment workflow to update an existing tenant."
            exit 1
          fi

          echo "Tenant does not exist. Proceeding with onboarding."

    # ---- Generate manifest from tier template ----
    - name: generate-tenant-manifest
      inputs:
        parameters:
          - name: tenant-id
          - name: tier
          - name: environment
          - name: release-version
      outputs:
        parameters:
          - name: manifest
            valueFrom:
              path: /tmp/tenant-manifest.yaml
        artifacts:
          - name: kustomization-patch
            path: /tmp/kustomization-patch.yaml
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -euo pipefail

          TENANT_ID="{{inputs.parameters.tenant-id}}"
          TIER="{{inputs.parameters.tier}}"
          ENV="{{inputs.parameters.environment}}"
          VERSION="{{inputs.parameters.release-version}}"
          POOL_ENV="pool-1-${ENV}"

          TEMPLATE_DIR="gitops/application-plane/${ENV}/tier-templates"
          TEMPLATE_FILE="${TEMPLATE_DIR}/${TIER}_tenant_template.yaml"

          echo "=== Generating tenant manifest ==="
          echo "  Template: ${TEMPLATE_FILE}"
          echo "  Tenant:   ${TENANT_ID}"
          echo "  Tier:     ${TIER}"

          # Read template and substitute placeholders
          if [ ! -f "${TEMPLATE_FILE}" ]; then
            echo "ERROR: Template file not found: ${TEMPLATE_FILE}"
            exit 1
          fi

          sed \
            -e "s/{TENANT_ID}/${TENANT_ID}/g" \
            -e "s/{RELEASE_VERSION}/${VERSION}/g" \
            -e "s/{POOL_ENV}/${POOL_ENV}/g" \
            "${TEMPLATE_FILE}" > /tmp/tenant-manifest.yaml

          echo "=== Generated manifest ==="
          cat /tmp/tenant-manifest.yaml

          # Generate kustomization patch to add the new tenant
          cat > /tmp/kustomization-patch.yaml <<EOF
          # Add ${TENANT_ID}.yaml to the ${TIER} kustomization
          path: gitops/application-plane/${ENV}/tenants/${TIER}/kustomization.yaml
          resource: ${TENANT_ID}.yaml
          EOF

          echo "=== Kustomization patch ==="
          cat /tmp/kustomization-patch.yaml

    # ---- Commit to Git ----
    - name: git-commit
      inputs:
        parameters:
          - name: tenant-id
          - name: tier
          - name: environment
          - name: manifest
        artifacts:
          - name: kustomization-patch
            path: /tmp/kustomization-patch.yaml
      script:
        image: alpine/git:2.43.0
        command: [sh]
        env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: git-credentials
                key: token
          - name: GIT_USER
            valueFrom:
              secretKeyRef:
                name: git-credentials
                key: username
        source: |
          set -euo pipefail

          TENANT_ID="{{inputs.parameters.tenant-id}}"
          TIER="{{inputs.parameters.tier}}"
          ENV="{{inputs.parameters.environment}}"
          REPO="{{workflow.parameters.git-repo}}"
          BRANCH="{{workflow.parameters.git-branch}}"

          TENANT_DIR="gitops/application-plane/${ENV}/tenants/${TIER}"
          MANIFEST_FILE="${TENANT_DIR}/${TENANT_ID}.yaml"
          KUSTOMIZATION_FILE="${TENANT_DIR}/kustomization.yaml"

          echo "=== Committing tenant manifest to git ==="

          # Clone repository
          REPO_WITH_AUTH=$(echo "${REPO}" | sed "s|https://|https://${GIT_USER}:${GIT_TOKEN}@|")
          git clone --depth 1 --branch "${BRANCH}" "${REPO_WITH_AUTH}" /tmp/repo
          cd /tmp/repo

          git config user.email "gitops-bot@example.com"
          git config user.name "GitOps Onboarding Bot"

          # Write tenant manifest
          mkdir -p "${TENANT_DIR}"
          cat > "${MANIFEST_FILE}" <<'MANIFEST_EOF'
          {{inputs.parameters.manifest}}
          MANIFEST_EOF

          # Update kustomization.yaml to include new tenant
          if grep -q "resources: \[\]" "${KUSTOMIZATION_FILE}" 2>/dev/null; then
            # Replace empty resources list
            sed -i "s|resources: \[\]|resources:\n  - ${TENANT_ID}.yaml|" "${KUSTOMIZATION_FILE}"
          elif grep -q "resources:" "${KUSTOMIZATION_FILE}" 2>/dev/null; then
            # Append to existing resources list (if not already present)
            if ! grep -q "${TENANT_ID}.yaml" "${KUSTOMIZATION_FILE}"; then
              sed -i "/^resources:/a\\  - ${TENANT_ID}.yaml" "${KUSTOMIZATION_FILE}"
            fi
          fi

          # Commit and push
          git add "${MANIFEST_FILE}" "${KUSTOMIZATION_FILE}"
          git commit -m "feat(tenant): onboard ${TENANT_ID} as ${TIER} tier in ${ENV}

          Automated by: tenant-onboarding workflow
          Tenant ID: ${TENANT_ID}
          Tier: ${TIER}
          Environment: ${ENV}"

          git push origin "${BRANCH}"

          echo "=== Successfully committed to ${BRANCH} ==="

    # ---- Verify ArgoCD sync ----
    - name: verify-argocd-sync
      inputs:
        parameters:
          - name: tenant-id
          - name: tier
      retryStrategy:
        limit: 10
        retryPolicy: "Always"
        backoff:
          duration: "15s"
          factor: 2
          maxDuration: "5m"
      script:
        image: bitnami/kubectl:1.29
        command: [sh]
        source: |
          set -euo pipefail

          TENANT_ID="{{inputs.parameters.tenant-id}}"
          TIER="{{inputs.parameters.tier}}"
          APP_NAME="${TENANT_ID}-${TIER}"

          echo "Waiting for ArgoCD application '${APP_NAME}' to sync..."

          # Check if application exists and is healthy
          STATUS=$(kubectl get application "${APP_NAME}" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
          SYNC=$(kubectl get application "${APP_NAME}" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")

          echo "  Health: ${STATUS}"
          echo "  Sync:   ${SYNC}"

          if [ "${STATUS}" = "Healthy" ] && [ "${SYNC}" = "Synced" ]; then
            echo "=== Tenant '${TENANT_ID}' successfully onboarded and healthy ==="
            exit 0
          fi

          echo "Application not yet healthy/synced. Will retry..."
          exit 1
