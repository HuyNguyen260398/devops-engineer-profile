# ============================================================================
# Tenant Onboarding WorkflowTemplate
# ============================================================================
# Automates the end-to-end onboarding of a new Jenkins tenant:
#   Wave 1: Validate inputs
#   Wave 2: Generate tenant Application manifest from tier template
#   Wave 3: Commit manifest to Git (triggers ArgoCD reconciliation)
#   Wave 4: Wait for ArgoCD sync to complete
#
# Prerequisites:
#   • Argo Workflows installed in argo-workflows namespace
#   • git-credentials Secret present (see control-plane/rbac/git-credentials-template.yaml)
#   • gitops-workflow-sa ServiceAccount with ClusterRole (see workflow-rbac.yaml)
#
# Trigger example:
#   argo submit -n argo-workflows --from workflowtemplate/tenant-onboarding \
#     -p tenant-name=acme-corp \
#     -p tier=advanced \
#     -p environment=staging \
#     --serviceaccount gitops-workflow-sa
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tenant-onboarding
  namespace: argo-workflows
  labels:
    app.kubernetes.io/name: tenant-onboarding
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/managed-by: argocd
spec:
  serviceAccountName: gitops-workflow-sa
  entrypoint: onboard-tenant
  arguments:
    parameters:
      - name: tenant-name
        description: "Unique tenant identifier (lowercase alphanumeric + hyphens)"
      - name: tier
        description: "Deployment tier: basic | advanced | premium"
        enum:
          - basic
          - advanced
          - premium
      - name: environment
        description: "Target environment: local | staging | production"
        enum:
          - local
          - staging
          - production
      - name: git-branch
        description: "Git branch to commit to"
        value: "main"
      - name: git-repo-url
        description: "Git repository URL"
        value: "https://github.com/your-org/devops-engineer-profile.git"  # UPDATE THIS

  templates:
    # ─────────────────────────────────────────────────────────────────────
    # Entry point – orchestrates all steps in sequence
    # ─────────────────────────────────────────────────────────────────────
    - name: onboard-tenant
      steps:
        - - name: validate-input
            template: validate-input
        - - name: generate-manifest
            template: generate-manifest
        - - name: commit-to-git
            template: commit-to-git
            arguments:
              artifacts:
                - name: manifest
                  from: "{{steps.generate-manifest.outputs.artifacts.manifest}}"
        - - name: wait-for-argocd-sync
            template: wait-for-argocd-sync

    # ─────────────────────────────────────────────────────────────────────
    # Step 1: Validate tenant name, tier, and environment combination
    # ─────────────────────────────────────────────────────────────────────
    - name: validate-input
      script:
        image: alpine:3.21
        command: [sh]
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        source: |
          set -e
          TENANT="{{workflow.parameters.tenant-name}}"
          TIER="{{workflow.parameters.tier}}"
          ENV="{{workflow.parameters.environment}}"

          # Validate tenant name: lowercase alphanumeric + hyphens, 3-32 chars
          echo "$TENANT" | grep -qE '^[a-z0-9][a-z0-9-]{1,30}[a-z0-9]$' || {
            echo "ERROR: Invalid tenant name '$TENANT'. Use lowercase alphanumeric + hyphens (3-32 chars)."
            exit 1
          }

          # Validate tier/environment combinations
          if [ "$ENV" = "local" ] && [ "$TIER" != "basic" ]; then
            echo "ERROR: Local environment only supports basic tier."
            exit 1
          fi
          if [ "$ENV" = "staging" ] && [ "$TIER" = "premium" ]; then
            echo "ERROR: Staging environment does not support premium tier."
            exit 1
          fi

          echo "Validation passed: tenant=$TENANT tier=$TIER env=$ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 2: Clone the tier template and substitute tenant placeholders
    # ─────────────────────────────────────────────────────────────────────
    - name: generate-manifest
      outputs:
        artifacts:
          - name: manifest
            path: /tmp/manifest.yaml
      script:
        image: alpine/git:2.45.2
        command: [sh]
        env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: git-credentials
                key: token
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        source: |
          set -e
          TENANT="{{workflow.parameters.tenant-name}}"
          TIER="{{workflow.parameters.tier}}"
          ENV="{{workflow.parameters.environment}}"
          REPO="{{workflow.parameters.git-repo-url}}"

          # Clone repository
          git clone "https://x-access-token:${GIT_TOKEN}@${REPO#https://}" /tmp/repo
          cd /tmp/repo

          TEMPLATE="gitops/application-plane/${ENV}/tier-templates/${TIER}_tenant_template.yaml"
          OUTPUT="/tmp/manifest.yaml"

          [ -f "$TEMPLATE" ] || { echo "ERROR: Template not found: $TEMPLATE"; exit 1; }

          # Substitute TENANT_NAME placeholder
          sed "s/TENANT_NAME/${TENANT}/g" "$TEMPLATE" > "$OUTPUT"

          echo "Manifest generated at $OUTPUT"
          cat "$OUTPUT"

    # ─────────────────────────────────────────────────────────────────────
    # Step 3: Commit the generated manifest to Git
    # ─────────────────────────────────────────────────────────────────────
    - name: commit-to-git
      inputs:
        artifacts:
          - name: manifest
            path: /tmp/manifest.yaml
      script:
        image: alpine/git:2.45.2
        command: [sh]
        env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: git-credentials
                key: token
          - name: GIT_USERNAME
            valueFrom:
              secretKeyRef:
                name: git-credentials
                key: username
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        source: |
          set -e
          TENANT="{{workflow.parameters.tenant-name}}"
          TIER="{{workflow.parameters.tier}}"
          ENV="{{workflow.parameters.environment}}"
          REPO="{{workflow.parameters.git-repo-url}}"
          BRANCH="{{workflow.parameters.git-branch}}"

          git clone "https://x-access-token:${GIT_TOKEN}@${REPO#https://}" /tmp/repo
          cd /tmp/repo
          git config user.email "gitops-workflow@gitops-platform"
          git config user.name "${GIT_USERNAME}"
          git checkout "$BRANCH"

          DEST="gitops/application-plane/${ENV}/tenants/${TIER}/${TENANT}.yaml"
          cp /tmp/manifest.yaml "$DEST"

          # Add new entry to kustomization.yaml
          KUST="gitops/application-plane/${ENV}/tenants/${TIER}/kustomization.yaml"
          grep -q "${TENANT}.yaml" "$KUST" || \
            sed -i "/^resources:/a\  - ${TENANT}.yaml" "$KUST"

          git add "$DEST" "$KUST"
          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }
          git commit -m "feat(gitops): onboard tenant ${TENANT} (${TIER}/${ENV})"
          git push
          echo "Committed and pushed: $DEST"

    # ─────────────────────────────────────────────────────────────────────
    # Step 4: Poll ArgoCD until the new Application reaches Synced + Healthy
    # ─────────────────────────────────────────────────────────────────────
    - name: wait-for-argocd-sync
      script:
        image: quay.io/argoproj/argocd:v2.10.0
        command: [sh]
        env:
          - name: ARGOCD_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: argocd-workflow-token
                key: token
                optional: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        source: |
          set -e
          TENANT="{{workflow.parameters.tenant-name}}"
          TIER="{{workflow.parameters.tier}}"
          ENV="{{workflow.parameters.environment}}"
          APP_NAME="${TENANT}-${TIER}-${ENV}"

          echo "Waiting for ArgoCD Application: $APP_NAME"

          # Wait up to 10 minutes for sync
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(argocd app get "$APP_NAME" \
              --server argocd-server.argocd.svc.cluster.local \
              --plaintext --output json 2>/dev/null \
              | grep -o '"syncStatus":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "Unknown")

            HEALTH=$(argocd app get "$APP_NAME" \
              --server argocd-server.argocd.svc.cluster.local \
              --plaintext --output json 2>/dev/null \
              | grep -o '"healthStatus":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "Unknown")

            echo "[$ELAPSED s] Sync=${STATUS} Health=${HEALTH}"

            if [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "Application $APP_NAME is Synced and Healthy. Onboarding complete."
              exit 0
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "ERROR: Timeout waiting for $APP_NAME to sync."
          exit 1
